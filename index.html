<style>
    body { margin: 0; overflow: hidden; background: white; touch-action: none; user-select: none; font-family: sans-serif; transition: background 0.1s, transform 0.2s; }
    #floor { position: absolute; bottom: 0; width: 100%; height: 20%; background: #4caf50; border-top: 5px solid #2e7d32; }
    #ceiling { position: absolute; top: 0; width: 100%; height: 10px; background: transparent; }
    #betaText { position: absolute; top: 10px; right: 10px; color: black; font-size: 14px; font-weight: bold; width: 200px; text-align: right; z-index: 100;}
    
    /* UI Buttons */
    #menuBtn { position: absolute; top: 10px; left: 10px; width: 50px; height: 50px; background: black; border-radius: 50%; color: white; font-size: 30px; text-align: center; line-height: 50px; cursor: pointer; z-index: 100;}
    #charMenu { position: absolute; top: -500px; left: 10px; transition: top 0.3s ease; display: flex; flex-direction: column; gap: 10px; z-index: 99;}
    .charBtn { width: 189px; height: 50px; background: rgba(0,0,0,0.8); border-radius: 10px; display: flex; align-items: center; color: white; cursor: pointer; transition: background 0.2s;}
    .charBtn:active { background: rgba(255,255,255,0.3); color: black; }
    .charBtn img { width: 40px; height: 40px; margin: 0 10px; border-radius: 5px;}
    .charBtn span { font-size: 16px; }
    
    .secretBtn { display: none; }
    .secretBtn span { color: #ffd700; text-shadow: 1px 1px 2px red;}

    /* Entities */
    .entity { position: absolute; border-radius: 50%; transition: transform 0.1s; display: none;}
    #player { width: 60px; height: 60px; background: black; bottom: 20%; left: 20%; z-index: 10; transition: left 0.1s, bottom 0.2s, background 0.2s, transform 0.2s;}
    #dummy { width: 60px; height: 60px; background: red; bottom: 20%; right: 20%; z-index: 9; transition: all 0.2s ease-out;}
    
    /* Dummy HP */
    #hpBarContainer { position: absolute; top: -20px; left: -10px; width: 80px; height: 10px; border: 2px solid black; background: black; }
    #hpBar { width: 100%; height: 100%; background: #4caf50; transition: width 0.2s;}

    /* Controls */
    #controls { position: absolute; bottom: 90px; left: 10px; display: none; gap: 20px; z-index: 50;}
    .arrowBtn { width: 60px; height: 60px; background: black; border-radius: 10px; color: white; font-size: 40px; text-align: center; line-height: 60px; opacity: 0.8;}
    
    /* Abilities */
    #abilities { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); display: none; gap: 10px; z-index: 50; transition: bottom 0.5s ease;}
    .ability { width: 60px; height: 60px; background: rgba(0,0,0,0.7); position: relative; overflow: hidden; color: white; font-size: 10px; text-align: center; display: flex; align-items: center; justify-content: center; border-radius: 5px;}
    .ability img { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: -1; object-fit: cover;}
    .cooldown { position: absolute; top: 0; left: 0; width: 100%; height: 0%; background: red; opacity: 0.8; z-index: 1;}
    .ability span { position: relative; z-index: 2; pointer-events: none; word-wrap: break-word; line-height: 1;}
    
    /* Ultimate UI */
    #kratosUltContainer { display: none; position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%); width: 120px; height: 15px; border: 1px solid white; outline: 1px solid black; background: #3a0000; z-index: 60; cursor: pointer; transition: bottom 0.5s ease; }
    #kratosUltBar { width: 0%; height: 100%; background: darkred; transition: width 0.3s; }
    #kratosUltText { position: absolute; width: 100%; top: -1px; text-align: center; color: white; font-size: 12px; font-weight: bold; text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000; pointer-events: none; }
    #kratosUltPrompt { display: none; position: absolute; top: 16px; width: 100%; text-align: center; color: white; font-size: 10px; font-weight: bold; text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000; }

    /* Error popup */
    #errorPopup { position: absolute; bottom: -50px; right: 10px; background: rgba(0,0,0,0.8); color: white; padding: 10px; border-radius: 5px; transition: bottom 0.3s; z-index: 200;}
    
    /* Effects */
    .hitEffect { position: absolute; width: 100px; height: 100px; background: url('https://www.dropbox.com/scl/fi/0egh8aea6k5wph789kaqr/Picsart_26-03-29_23-58-56-259.png?rlkey=7rpzc6q79m4cnxj3f6bthuasq&st=rn7cod7b&dl=1'); background-size: contain; background-repeat: no-repeat; z-index: 20; pointer-events: none;}
</style>

const playSnd = (s) => { s.currentTime = 0; s.play().catch(e => console.log('Sound error', e)); };

let state = {
    char: null,
    menuOpen: false,
    secretClicks: 0,
    lastClickTime: 0,
    locked: false, 
    pX: 10, 
    pY: 20, 
    dX: 50, 
    dY: 20,
    dHP: 100,
    moveL: false,
    moveR: false,
    lastMove1Time: 0,
    ab1Hit: false, 
    ab1T1: null, 
    ab1T2: null,
    slowed: false,
    ultCharge: 0,
    kratosUltActive: false,
    heroUltActive: false,
    kratosUltInterval: null
};

const el = (id) => document.getElementById(id);
const player = el('player');
const dummy = el('dummy');
const hpBar = el('hpBar');
const abContainer = el('abilities');
const ultContainer = el('kratosUltContainer');
const ultBar = el('kratosUltBar');
const ultPrompt = el('kratosUltPrompt');

setInterval(() => {
    if(state.locked || !state.char) return;
    let spd = state.slowed ? 0.25 : 0.5; 
    if(state.moveL && state.pX > 0) state.pX -= spd;
    if(state.moveR && state.pX < 90) state.pX += spd;
    player.style.left = state.pX + '%';
}, 16);

const addTouch = (elem, isLeft) => {
    elem.addEventListener('touchstart', (e) => { e.preventDefault(); if(isLeft) state.moveL=true; else state.moveR=true; });
    elem.addEventListener('touchend', (e) => { e.preventDefault(); if(isLeft) state.moveL=false; else state.moveR=false; });
    elem.addEventListener('mousedown', () => { if(isLeft) state.moveL=true; else state.moveR=true; });
    elem.addEventListener('mouseup', () => { if(isLeft) state.moveL=false; else state.moveR=false; });
};
addTouch(el('leftBtn'), true);
addTouch(el('rightBtn'), false);

el('menuBtn').addEventListener('click', () => {
    playSnd(sounds.click);
    state.menuOpen = !state.menuOpen;
    el('charMenu').style.top = state.menuOpen ? '70px' : '-500px';
    
    let now = Date.now();
    if(now - state.lastClickTime < 400) state.secretClicks++; else state.secretClicks = 1;
    state.lastClickTime = now;
    if(state.secretClicks >= 20) {
        el('aliceBtn').style.display = 'flex';
        el('agethaBtn').style.display = 'flex';
    }
});

const selectChar = (name) => {
    if(state.locked) return;
    if(state.char === name) {
        playSnd(sounds.err);
        el('errorPopup').style.bottom = '20px';
        setTimeout(() => el('errorPopup').style.bottom = '-50px', 6000);
        return;
    }
    playSnd(sounds.click);
    state.char = name;
    el('charMenu').style.top = '-500px';
    state.menuOpen = false;
    player.style.display = 'block';
    dummy.style.display = 'block';
    el('controls').style.display = 'flex';
    abContainer.style.display = 'flex';
    
    ultContainer.style.display = 'block'; 
    state.ultCharge = 0;
    state.kratosUltActive = false;
    state.heroUltActive = false;
    ultBar.style.width = '0%';
    ultPrompt.style.display = 'none';
    
    if (name === 'Kratos') {
        el('kratosUltText').innerText = 'God Of War';
    } else if (name === 'Hero') {
        el('kratosUltText').innerText = 'Serious Mode';
    } else {
        el('kratosUltText').innerText = '?';
    }

    state.pX = 10; state.dX = 50;
    player.style.left = state.pX+'%'; dummy.style.left = state.dX+'%';
    player.style.background = 'black';
    
    if(name === 'Alice') {
        player.style.background = 'red';
        setTimeout(() => player.style.background = 'black', 2000);
        setupAliceAbilities();
    } else if (name === 'Agetha') {
        setupAgethaAbilities();
    } else if (name === 'Kratos') {
        setupKratosAbilities();
    } else if (name === 'Hero') {
        setupHeroAbilities();
    } else {
        setupJunAbilities();
    }
};

const addUltCharge = () => {
    if (state.kratosUltActive || state.heroUltActive) return;
    
    let maxCharge = (state.char === 'Hero') ? 2 : 18;

    if (state.ultCharge < maxCharge) {
        state.ultCharge++;
        ultBar.style.width = (state.ultCharge / maxCharge * 100) + '%';
        if (state.ultCharge >= maxCharge && (state.char === 'Kratos' || state.char === 'Hero')) {

const dealDamage = (dmg) => {
    state.dHP -= dmg;
    if(dmg > 0) addUltCharge(); 
    
    if(state.dHP <= 0) {
        state.dHP = 0;
        hpBar.style.width = '0%';
        hpBar.style.background = 'black'; 
        dummy.style.transform = `rotate(90deg) translateY(50px)`; 
        setTimeout(() => { 
            state.dHP = 100;
            hpBar.style.width = '100%';
            hpBar.style.background = '#4caf50';
            state.dX = 50; dummy.style.left = state.dX+'%';
            dummy.style.transform = 'none';
        }, 4000);
    } else {
        hpBar.style.width = state.dHP + '%';
        dummy.style.transform = `rotate(${(Math.random()-0.5)*90}deg) translate(${(Math.random()-0.5)*20}px, ${(Math.random()-0.5)*20}px)`;
        setTimeout(() => dummy.style.transform = 'none', 500);
    }
};

const createUIAbility = (name, icon, cooldownSec, actionFn, bgStyle = 'rgba(0,0,0,0.7)') => {
    let div = document.createElement('div');
    div.className = 'ability';
    div.style.background = bgStyle;
    if(icon) div.innerHTML = `<img src="${icon}">`;
    div.innerHTML += `<span>${name}</span><div class="cooldown"></div>`;
    let cdEl = div.querySelector('.cooldown');
    let spanEl = div.querySelector('span');
    let isReady = true;
    div.addEventListener('click', () => {
        if(!isReady) return;
        if(actionFn(cdEl, spanEl) === false) return;
        isReady = false;
        cdEl.style.transition = 'none';
        cdEl.style.height = '100%';
        cdEl.style.background = 'red';
        setTimeout(() => {
            cdEl.style.transition = `height ${cooldownSec}s linear`;
            cdEl.style.height = '0%';
        }, 50);
        setTimeout(() => {
            cdEl.style.background = 'white'; 
            cdEl.style.height = '100%';
            setTimeout(() => { cdEl.style.height = '0%'; isReady = true; }, 300);
        }, cooldownSec * 1000);
    });
    abContainer.appendChild(div);
};

const checkHit = () => Math.abs(state.pX - state.dX) < 25 && state.dHP > 0;
const anim = (el, prop, val, time) => { el.style.transition = `all ${time}s`; el.style[prop] = val; };

const spawnEffect = (url, w, h, x, y, dur) => {
    let ef = document.createElement('div');
    ef.style.cssText = `position:absolute; width:${w}px; height:${h}px; left:${x}%; bottom:${y}%; background:url('${url}'); background-size:contain; background-repeat:no-repeat; background-position:center bottom; z-index:20; pointer-events:none; transition: all 0.2s ease; transform: translateX(-50%);`;
    document.body.appendChild(ef);
    if(dur) setTimeout(() => { ef.style.opacity = '0'; setTimeout(()=>ef.remove(), 200); }, dur);
    return ef;
};

    createUIAbility('Chain of God', 'https://www.dropbox.com/scl/fi/yqtlojf1wyeas9334pby5/Picsart_26-03-31_18-16-24-143.png?rlkey=vu1psmsm3zsxbttd05fnxvg8k&st=6cu0caj3&dl=1', 35, () => {
        if(state.locked) return false;
        state.locked = true; 
        playSnd(sounds.kraUltAb1);
        
        let pCentX = state.pX;
        let pCentY = 20;

        let chainL = spawnEffect('https://www.dropbox.com/scl/fi/yqtlojf1wyeas9334pby5/Picsart_26-03-31_18-16-24-143.png?rlkey=vu1psmsm3zsxbttd05fnxvg8k&st=6cu0caj3&dl=1', 400, 600, pCentX - 10, 100, null);
        let chainR = spawnEffect('https://www.dropbox.com/scl/fi/yqtlojf1wyeas9334pby5/Picsart_26-03-31_18-16-24-143.png?rlkey=vu1psmsm3zsxbttd05fnxvg8k&st=6cu0caj3&dl=1', 400, 600, pCentX + 10, 100, null);
        
        setTimeout(() => { anim(chainL, 'bottom', '0%', 0.1); anim(chainR, 'bottom', '0%', 0.1); }, 50);

        let totalTime = 4000; 
        let beatInterval = setInterval(() => {
            chainL.style.transform = `translateX(-50%) translate(${(Math.random()-0.5)*30}px, ${(Math.random()-0.5)*30}px) rotate(${(Math.random()-0.5)*60}deg)`;
            chainR.style.transform = `translateX(-50%) translate(${(Math.random()-0.5)*30}px, ${(Math.random()-0.5)*30}px) rotate(${(Math.random()-0.5)*60}deg)`;
            
            if(Math.abs(state.pX - state.dX) < 40 && state.dHP > 0) {
                 dummy.style.left = (state.dX + (Math.random()-0.5)*5) + '%';
            }

        }, 50); 

        setTimeout(() => {
            clearInterval(beatInterval);
            
            anim(chainL, 'bottom', '100%', 0.2);
            anim(chainR, 'bottom', '100%', 0.2);
            setTimeout(() => { chainL.remove(); chainR.remove(); }, 200);

            if(Math.abs(state.pX - state.dX) < 45 && state.dHP > 0) {
                dealDamage(85); 
                state.dX = Math.min(90, state.dX+30); 
                anim(dummy, 'left', state.dX+'%', 0.3);
                spawnEffect('https://www.dropbox.com/scl/fi/d6tzac7i9cehqopcl8226/Picsart_26-03-31_18-02-17-697.png?rlkey=38seu2ttdh2mk6al1ll2uyl51&st=4sgvvbig&dl=1', 1200, 1200, state.dX, 20, 2000); 
            }
            state.locked = false;
        }, totalTime);

    });

    createUIAbility('Mighty Fists of God', '', 28, () => {
        if(state.locked) return false;
        state.locked = true;
        playSnd(sounds.kraUltAb2);
        
        let oldX = state.pX;
        spawnEffect('https://www.dropbox.com/scl/fi/avewgl3bd7eyb5yl7voos/Picsart_26-03-31_18-42-08-716.png?rlkey=ykbzho52crp1yxpfj5t21udgu&st=vqeax22q&dl=1', 900, 900, oldX, 20, 1000); 
        
        state.pX = Math.min(90, state.pX + 30); 
        anim(player, 'left', state.pX+'%', 0.1);
        
        setTimeout(() => {
            if(Math.abs(state.pX - state.dX) < 35 && state.dHP > 0) {
                player.style.bottom = '50%';
                let pInt = setInterval(() => {
                    player.style.transform = `translate(${(Math.random()-0.5)*60}px, ${(Math.random()-0.5)*60}px) rotate(${Math.random()*360}deg)`; 
                }, 20); 
                
                setTimeout(() => {
                    clearInterval(pInt);
                    player.style.transform = 'none';
                    player.style.bottom = '20%';
                    dealDamage(55);
                    dummy.style.bottom = '10%'; 
                    setTimeout(() => dummy.style.bottom = '20%', 300);
                    state.locked = false;
                }, 4000);
            } else {
                state.locked = false;
            }
        }, 150);
    });
};

const setupAliceAbilities = () => {
    abContainer.innerHTML = '';
    anim(abContainer, 'bottom', '10px', 0.5);
    createUIAbility('', 'https://www.dropbox.com/scl/fi/jfz3ikkfzadhf10qwdy1z/NewSpikesIcon.webp?rlkey=ewn4lf120guxsrqdyb7p8ttc3&st=9qxpky1j&dl=1', 2.5, (cdEl, spanEl) => {
        if(state.locked) return false;
        state.locked = true;
        playSnd(sounds.spike); playSnd(sounds.laugh);
        for(let i=0; i<=100; i+=3) {
            let spike = document.createElement('div');
            spike.style.cssText = `position:absolute; bottom:20%; left:${i}%; width:10px; height:0px; background:black; border-left: 1px solid #222; z-index:8; transition:height 0.15s ease-out;`;
            document.body.appendChild(spike);
            setTimeout(() => spike.style.height = '150vh', 50 + Math.random()*50);
            setTimeout(() => { spike.style.height = '0px'; setTimeout(()=>spike.remove(), 200); }, 2000);
        }
        setTimeout(() => { if(state.dHP > 0) { playSnd(sounds.aliceHit); dealDamage(1400); } }, 500);
        setTimeout(() => { state.locked = false; }, 200);
    });

    createUIAbility('', 'https://www.dropbox.com/scl/fi/twyzmrfzb83ykljzte3sr/AttackIcon.webp?rlkey=hgqkyfbxqzwdyttdqp1u63wni&st=843px1qb&dl=1', 0.5, () => {
        if(state.locked) return false;
        state.locked = true;
        anim(player, 'transform', 'scaleY(1.2)', 0.1);
        setTimeout(() => anim(player, 'transform', 'none', 0.1), 100);
        if(checkHit()) {
            playSnd(sounds.aliceHit);
            dealDamage(35);
            let hitEf = document.createElement('div');
            hitEf.className = 'hitEffect'; hitEf.style.left = state.dX+'%'; hitEf.style.bottom = '20%';
            document.body.appendChild(hitEf);
            setTimeout(()=>hitEf.remove(), 500);
            state.dX = Math.min(90, state.dX+15);
            anim(dummy, 'left', state.dX+'%', 0.2); 
        } else {
            playSnd(sounds.swing);
        }
        setTimeout(() => state.locked = false, 50);
    });

    createUIAbility('', 'https://www.dropbox.com/scl/fi/7e7o5k8rtkafat43uvi7b/NewTeleportIcon.webp?rlkey=21pq2u7q6990hlx8nr1462an6&st=14lvq638&dl=1', 5, () => {
        if(state.locked) return false;
        state.locked = true;
        player.style.background = '#ffcccc';
        playSnd(sounds.aliTele1);
        setTimeout(() => {
            playSnd(sounds.aliTele2);
            player.style.background = 'black'; 
            let dir = state.dX > state.pX ? 20 : -20;
            state.pX = Math.max(0, Math.min(90, state.pX + dir));
            player.style.left = state.pX + '%';
            state.locked = false;
        }, 1000);
    });
};
